<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps - Fleet Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .sidebar-active { background-color: #f59e0b; color: white; border-radius: 6px; }
  </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-gray-900 text-white flex flex-col">
    <div class="p-6 text-2xl font-bold border-b border-gray-800">TransitOps</div>
    <nav class="flex-1 p-4 space-y-1 text-sm">
      <li onclick="navigate('dashboard')" class="p-3 hover:bg-gray-800 cursor-pointer flex items-center gap-3"><i class="fas fa-home"></i> Dashboard</li>
      <li onclick="navigate('fleet')" class="p-3 hover:bg-gray-800 cursor-pointer flex items-center gap-3"><i class="fas fa-truck"></i> Fleet</li>
      <li onclick="navigate('drivers')" class="p-3 sidebar-active hover:bg-gray-800 cursor-pointer flex items-center gap-3"><i class="fas fa-users"></i> Drivers</li>
      <li onclick="navigate('trips')" class="p-3 hover:bg-gray-800 cursor-pointer flex items-center gap-3"><i class="fas fa-route"></i> Trips</li>
      <li onclick="navigate('maintenance')" class="p-3 hover:bg-gray-800 cursor-pointer flex items-center gap-3"><i class="fas fa-tools"></i> Maintenance</li>
      <li onclick="navigate('fuel')" class="p-3 hover:bg-gray-800 cursor-pointer flex items-center gap-3"><i class="fas fa-gas-pump"></i> Fuel & Expenses</li>
      <li onclick="navigate('analytics')" class="p-3 hover:bg-gray-800 cursor-pointer flex items-center gap-3"><i class="fas fa-chart-bar"></i> Analytics</li>
      <li onclick="navigate('settings')" class="p-3 hover:bg-gray-800 cursor-pointer flex items-center gap-3"><i class="fas fa-cog"></i> Settings</li>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="bg-white border-b px-6 py-4 flex items-center justify-between">
      <input id="searchInput" onkeyup="handleSearch()" type="text" placeholder="Search drivers..." 
             class="w-96 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
      <div class="flex items-center gap-4">
        <span class="font-medium">Raven K.</span>
        <span class="bg-blue-600 text-white text-sm px-3 py-1 rounded-full">Dispatcher</span>
      </div>
    </div>

    <div id="pageContent" class="flex-1 overflow-auto p-6"></div>
  </div>
</div>

<!-- Add / Edit Driver Modal -->
<div id="driverModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl w-full max-w-md p-8">
    <h2 id="modalTitle" class="text-2xl font-semibold mb-6">Add New Driver</h2>
    <form id="driverForm" onsubmit="saveDriver(event)">
      <input type="hidden" id="editIndex">
      
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium mb-1">Full Name</label>
          <input id="name" type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">License Number</label>
          <input id="license" type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Expiry Date</label>
            <input id="expiry" type="text" placeholder="MM/YYYY" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Category</label>
            <select id="category" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
              <option value="LMV">LMV</option>
              <option value="HMV">HMV</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Phone Number</label>
          <input id="contact" type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
      </div>

      <div class="flex gap-3 mt-8">
        <button type="button" onclick="closeModal()" 
                class="flex-1 py-3 border border-gray-300 rounded-xl font-medium">Cancel</button>
        <button type="submit" 
                class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-medium">Save Driver</button>
      </div>
    </form>
  </div>
</div>

<script>
// Sample Data
let drivers = [
  { name: "Alex", license: "DL-88215", expiry: "12/2028", category: "LMV", contact: "98765xxxxx", status: "Available" },
  { name: "John", license: "DL-44120", expiry: "03/2025 EXPIRE", category: "HMV", contact: "98220xxxxx", status: "Suspended" },
  { name: "Priya", license: "DL-77031", expiry: "08/2027", category: "LMV", contact: "94110xxxxx", status: "On Trip" },
  { name: "Suresh", license: "DL-90045", expiry: "01/2027", category: "HMV", contact: "97440xxxxx", status: "Off Duty" }
];

// Render Drivers Page
function renderDrivers() {
  let html = `
    <h1 class="text-3xl font-semibold mb-6">Drivers & Safety Profiles</h1>
    <button onclick="showAddModal()" 
            class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-xl flex items-center gap-2 mb-6">
      <i class="fas fa-plus"></i> Add Driver
    </button>
    <table class="w-full bg-white rounded-2xl shadow-sm overflow-hidden">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-6 py-4 text-left">Driver</th>
          <th class="px-6 py-4 text-left">License</th>
          <th class="px-6 py-4 text-left">Expiry</th>
          <th class="px-6 py-4 text-left">Contact</th>
          <th class="px-6 py-4 text-left">Status</th>
          <th class="px-6 py-4 text-center">Actions</th>
        </tr>
      </thead>
      <tbody id="driversTableBody" class="divide-y"></tbody>
    </table>`;

  document.getElementById('pageContent').innerHTML = html;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('driversTableBody');
  tbody.innerHTML = drivers.map((driver, index) => `
    <tr class="hover:bg-gray-50">
      <td class="px-6 py-4 font-medium">${driver.name}</td>
      <td class="px-6 py-4">${driver.license}</td>
      <td class="px-6 py-4 ${driver.expiry.includes('EXPIRE') ? 'text-red-600 font-medium' : ''}">${driver.expiry}</td>
      <td class="px-6 py-4">${driver.contact}</td>
      <td class="px-6 py-4">
        <span class="px-4 py-1 rounded-full text-sm font-medium
          ${driver.status === 'Available' ? 'bg-green-100 text-green-700' : ''}
          ${driver.status === 'On Trip' ? 'bg-blue-100 text-blue-700' : ''}
          ${driver.status === 'Suspended' ? 'bg-orange-100 text-orange-700' : ''}
          ${driver.status === 'Off Duty' ? 'bg-gray-100 text-gray-700' : ''}">
          ${driver.status}
        </span>
      </td>
      <td class="px-6 py-4 text-center">
        <button onclick="editDriver(${index})" class="text-blue-600 hover:text-blue-800 mr-4"><i class="fas fa-edit"></i></button>
        <button onclick="deleteDriver(${index})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

// Modal Functions
function showAddModal() {
  document.getElementById('modalTitle').textContent = 'Add New Driver';
  document.getElementById('driverForm').reset();
  document.getElementById('editIndex').value = '';
  document.getElementById('driverModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('driverModal').classList.add('hidden');
}

function saveDriver(e) {
  e.preventDefault();
  
  const editIndex = document.getElementById('editIndex').value;
  const newDriver = {
    name: document.getElementById('name').value,
    license: document.getElementById('license').value,
    expiry: document.getElementById('expiry').value,
    category: document.getElementById('category').value,
    contact: document.getElementById('contact').value,
    status: "Available"
  };

  if (editIndex !== '') {
    drivers[editIndex] = newDriver;
  } else {
    drivers.push(newDriver);
  }

  closeModal();
  renderTable();
}

function editDriver(index) {
  const driver = drivers[index];
  document.getElementById('modalTitle').textContent = 'Edit Driver';
  document.getElementById('editIndex').value = index;
  document.getElementById('name').value = driver.name;
  document.getElementById('license').value = driver.license;
  document.getElementById('expiry').value = driver.expiry;
  document.getElementById('category').value = driver.category || "LMV";
  document.getElementById('contact').value = driver.contact;
  document.getElementById('driverModal').classList.remove('hidden');
}

function deleteDriver(index) {
  if (confirm("Delete this driver?")) {
    drivers.splice(index, 1);
    renderTable();
  }
}

// Other pages (simplified)
function navigate(page) {
  if (page === 'drivers') {
    renderDrivers();
  } else if (page === 'analytics') {
    document.getElementById('pageContent').innerHTML = `<h1 class="text-3xl font-semibold">Analytics</h1><p class="mt-4">Charts for trips and fuel will appear here.</p>`;
  } else {
    document.getElementById('pageContent').innerHTML = `<h1 class="text-3xl font-semibold">${page.charAt(0).toUpperCase() + page.slice(1)}</h1>`;
  }
}

function handleSearch() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const filtered = drivers.filter(d => d.name.toLowerCase().includes(term));
  // Re-render table with filtered data
  const tbody = document.getElementById('driversTableBody');
  if (tbody) {
    tbody.innerHTML = filtered.map((driver, index) => { /* same as above */ }).join('');
  }
}

// Initialize
navigate('drivers');
</script>

</body>
</html>
